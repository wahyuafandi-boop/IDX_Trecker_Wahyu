# Markup Radar — konfigurasi engine
# Threshold di sini adalah DEFAULT awal. Wajib di-tune via backtesting (Phase 5).

# Universe saham yang di-scan tiap hari (EOD).
# Bisa diganti dengan LQ45 / IDX30 / watchlist manual.
# CATATAN: threshold di bawah di-tune pada big-cap (window bearish, edge lemah).
# Watchlist small-cap ini lebih volatil (RVOL gampang spike, antrian tipis &
# mudah di-mainkan) → sinyal cenderung lebih banyak/bising. Pakai sebagai
# pengamatan forward (size kecil) sampai data live cukup untuk tune ulang.
watchlist:
  - KOCI
  - JARR
  - VERN
  - PPRE
  - ESIP

# Window perhitungan rolling.
windows:
  volume_ma: 20        # MA20 untuk RVOL (S6)
  ihsg_ma: 50          # MA50 IHSG (S9) + regime selector (BULLISH/BEARISH)
  broker_streak_lookback: 5  # berapa hari ke belakang untuk net-buy streak (S3)
  rs_window: 20        # S10 relative strength (return saham - return IHSG)
  donchian_lookback: 20  # resis/support untuk trade levels (entry/SL/TP)

# Top-N broker untuk net flow & concentration (S3, S4).
broker:
  top_n: 5

# Batas request API per menit (sesuaikan dengan tier Invezgo: Advance 250, dst).
# Client akan throttle proaktif agar tidak kena HTTP 429.
api:
  rate_limit_per_min: 250

# Threshold sinyal (lihat spec §3 & §4).
# Di-tune 2026-06-21 via backtest 13 saham (n=2220). Catatan penting: metrik
# fwd_max/hit-rate MENYESATKAN (spike intraday, bukan return ke-hold). Pada
# fwd_close realistis, edge cuma muncul di HORIZON 10-20 HARI (swing 2-4 minggu),
# bukan 5 hari. rvol_spike=2.0 (bukan 1.5) yang optimal di horizon itu:
# edge@20d +4.4% vs baseline, win 54%. done_ratio_markup tetap 0.55.
thresholds:
  done_ratio_buyer: 0.55      # S1: > buyer control
  done_ratio_seller: 0.45     # S1: < seller control
  done_ratio_markup: 0.55     # gate MARKUP_START (tuned, was 0.60)
  done_ratio_distribution: 0.40
  rvol_spike: 2.0            # S6: volume spike 2x = konviksi swing 10-20d
  close_in_range_strong: 0.60 # S7
  queue_imbalance_demand: 1.0 # S5: gate tier MARKUP_CONFIRMED (bid/offer di close).
                              # LIVE-only (order book tak historis → backtest S5=0,
                              # CONFIRMED tak muncul). Tune 1.0–1.2 setelah data live
                              # terkumpul; >1.0 = butuh demand antri lebih dominan.
  queue_top_levels: 4         # S5 live: jumlah baris bid/offer "nyata" yg dibaca
                              # (bandarmologi: 4 teratas; level dalam sering diada-ada).
  queue_bigmoney_lot_per_order: 20  # S5 live: lot/order (lot/freq) top-N >= ini =
                              # sidik jari big money (order gede / lot seragam). Ritel =
                              # order kecil acak (lpo rendah). Price-dependent → tune
                              # setelah lihat data live (jalankan live_watch --probe).
  queue_wall_pull_drop: 0.35  # S5 live: tembok offer mengecil >= 35% antar-siklus =
                              # dicabut/dimakan ('v') → sering pemicu jebol (entry).
  absorption_min_rvol: 1.5    # S2: butuh volume "tinggi"
  broker_net_buy_streak_min: 3  # ACCUMULATION_ONGOING
  near_range_high: 0.80       # DISTRIBUTION_WARNING

# Profil regime: overlay thresholds yang dipilih IHSG vs MA50 (spec §4.5/§6).
# Dipakai: eff = {**thresholds, **regime_profiles[regime]} -> classify(signals, eff).
#
# F8 TUNE 2026-06-23 (scripts/tune_f8.py; AVIA TPIA BULL HEAL MAPA BREN PTRO, 2024-06..2026-06):
# Backtest dijalankan, TAPI sinyal MARKUP terlalu sedikit untuk tuning yang meyakinkan
# (BULLISH n~5-28 across grid; BEARISH n~1-5). hit_rate@fwd_close+5%/20d: BULLISH 17-29%
# (TIDAK naik dgn rvol -> bukan edge jelas, kemungkinan noise), BEARISH 0% (n<=5). Ablation RS
# inconclusive (n=1 vs 2). Levels>null directional positif tapi didorong 1 trade (BULL +31%).
# KEPUTUSAN: PERTAHANKAN prior (jangan overfit noise / longgarkan rvol di bear — spec §2/§10).
# Angka di bawah = prior spec, SUDAH dicek empiris (bukan lagi tebakan buta); belum "final" sampai
# cukup sinyal forward terkumpul (mirror Sheets) utk tune dgn n memadai + base-rate NEUTRAL.
regime_profiles:
  BULLISH:
    rvol_spike: 2.0           # F8: tetap (1.5 naikin hit in-sample tapi overfit; spec lipat selektif)
    require_relative_strength: false
    rs_min: 0.0
    atr_mult_sl: 2.0
    rr_target: 2.0
    risk_per_trade: 0.01      # metadata (engine tak eksekusi)
  BEARISH:
    rvol_spike: 2.5           # NAIK di market lemah, bukan turun (F8: tetap; n bear terlalu kecil)
    require_relative_strength: true   # F8: ablation inconclusive (n=1v2) -> KEEP (default selektif)
    rs_min: 0.0               # >0 = harus outperform; 0 = minimal seimbang dgn IHSG
    atr_mult_sl: 1.8
    rr_target: 2.0
    risk_per_trade: 0.005     # potong setengah

# Param trade levels (default lintas regime; atr_mult_sl & rr_target diambil dari profil).
levels:
  breakout_buffer: 0.005      # 0.5% di atas resis = konfirmasi jebol
  atr_period: 14
  min_stop_pct: 0.03          # floor: SL tak pernah lebih ketat dari 3%
  hold_slack: 1.8             # faktor estimasi est_hold (harga tak gerak lurus)

# Bobot confidence score MARKUP_START (total 100), lihat spec §4/§4.7.
# relative_strength (S10) ditambahkan; queue_imbalance & ihsg dipotong 10->5 agar
# total tetap 100. Confidence = ordering alert (sekunder), boleh di-tune belakangan.
score_weights:
  done_ratio: 25
  rvol: 20
  close_in_range: 15
  broker_streak: 20
  queue_imbalance: 5
  ihsg: 5
  relative_strength: 10

# State yang dianggap actionable untuk dikirim ke alert.
alert_states:
  - MARKUP_CONFIRMED
  - MARKUP_START
  - ACCUMULATION_ONGOING
  - DISTRIBUTION_WARNING

# Telegram: chat tujuan alert.
# chat_id boleh di sini (bukan rahasia). TOKEN WAJIB lewat env/secret
# (TELEGRAM_BOT_TOKEN), jangan pernah ditaruh di file ini.
# Env TELEGRAM_CHAT_ID (kalau di-set) akan menimpa nilai di sini.
telegram:
  chat_id: 6788518859

# Aktifkan narasi via Claude API (Phase 6). Model claude-opus-4-8 (jangan
# downgrade tanpa alasan; per panduan claude-api). Fallback rule-based otomatis
# bila SDK/keys tak ada. ~1 call Opus per sinyal actionable/run (biaya kecil).
narrative:
  enabled: true
  model: claude-opus-4-8

# Mirror hasil scan ke Google Sheets (persistensi histori + dashboard Phase 6).
# Runner GitHub Actions ephemeral → SQLite reset tiap run; Sheets jadi penampung
# histori forward lintas run (kebutuhan #1: akumulasi data buat validasi edge).
# spreadsheet_id BUKAN rahasia, boleh di sini (atau override env MARKUP_RADAR_SHEET_ID).
# Kredensial service-account JSON WAJIB lewat env GOOGLE_SERVICE_ACCOUNT_JSON
# (secret CI) atau GOOGLE_APPLICATION_CREDENTIALS (path file, lokal). Share
# spreadsheet ke email service-account (Editor) dulu. Kosong/lib absen = sink mati.
sheets:
  enabled: true
  spreadsheet_id: ""     # isi ID Google Sheet tujuan (dari URL .../d/<ID>/edit)
  worksheet: signals
