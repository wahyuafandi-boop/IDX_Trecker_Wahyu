name: Test Sheets

# Trigger manual dari tab Actions untuk memverifikasi mirror Google Sheets:
# kredensial service-account → buka spreadsheet → tulis 1 baris penanda.
# Tidak butuh data Invezgo / tidak kirim Telegram.
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Write verification row to Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MARKUP_RADAR_SHEET_ID: ${{ vars.MARKUP_RADAR_SHEET_ID }}
        run: python scripts/test_sheets.py
