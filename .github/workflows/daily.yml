name: Daily Markup Radar

# EOD scan setelah data harian Invezgo update (~18:00 WIB).
# Cron GitHub Actions pakai UTC: 12:00 UTC = 19:00 WIB (Senin–Jumat).
on:
  # DINONAKTIFKAN 2026-06-23: cloud EOD dimatikan agar TIDAK dobel dengan VPS.
  # Runner harian tunggal = VPS (cron run_eod.sh + run_live.sh), watchlist tunggal =
  # watchlist_today.txt di VPS. Untuk mengaktifkan lagi: un-comment 2 baris schedule.
  # schedule:
  #   - cron: "0 12 * * 1-5"
  workflow_dispatch:        # tetap bisa di-trigger MANUAL dari tab Actions bila perlu
    inputs:
      date:
        description: "Tanggal scan (YYYY-MM-DD, kosong = hari ini)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (jangan kirim Telegram)"
        type: boolean
        required: false
        default: false

concurrency:
  group: daily-markup-radar
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          INVEZGO_API_KEY: ${{ secrets.INVEZGO_API_KEY }}
          INVEZGO_BASE_URL: ${{ secrets.INVEZGO_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Mirror persisten ke Google Sheets (histori numpuk lintas run).
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MARKUP_RADAR_SHEET_ID: ${{ vars.MARKUP_RADAR_SHEET_ID }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/run_daily.py $ARGS

      # SQLite di runner bersifat ephemeral; simpan sebagai artifact untuk audit.
      - name: Upload results DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markup-radar-db
          path: data/*.db
          if-no-files-found: ignore
          retention-days: 30
